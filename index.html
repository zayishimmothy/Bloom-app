<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Bloom: Mental Health Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --ink: #211B2E;
    --surface: #2F2740;
    --surface-hi: #3B3252;
    --sage: #7FA582;
    --sage-bright: #9CC49E;
    --rose: #E3A9A0;
    --cream: #F5F1EC;
    --lavender: #B7AECD;
    --lavender-dim: #837A9C;
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'Sora', -apple-system, sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Sora:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

  * { box-sizing: border-box; margin:0; padding:0; }

  body {
    background: #14101d;
    min-height:100vh;
    font-family: var(--font-body);
    padding: 40px 24px;
  }

  @media (max-width: 540px) {
    body { padding: 0; }
    .app { max-width: none; min-height: 100vh; border-radius: 0; box-shadow:none; }
  }

  .app {
    width: 100%;
    max-width: 460px;
    margin: 0 auto;
    background: var(--ink);
    border-radius: 24px;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.5);
    overflow: hidden;
    position: relative;
    display:flex;
    flex-direction:column;
    color: var(--cream);
    min-height: 600px;
  }

  .screen {
    flex: 1;
    display:flex;
    flex-direction:column;
    padding: 28px 30px 0;
    overflow: hidden;
    position: relative;
  }

  /* subtle ambient background glow */
  .screen::before {
    content:'';
    position:absolute;
    top: -80px; left: 50%;
    transform: translateX(-50%);
    width: 340px; height: 340px;
    background: radial-gradient(circle, rgba(127,165,130,0.16), transparent 70%);
    pointer-events:none;
  }

  header.appbar {
    display:flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 10px 2px 2px;
    z-index: 1;
  }

  .brand {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 26px;
    letter-spacing: -0.01em;
  }

  .date {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--lavender-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .header-right {
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap: 4px;
  }

  .signout-link {
    font-family: var(--font-mono);
    font-size: 9.5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--lavender-dim);
    cursor: pointer;
    background:none;
    border:none;
    padding:0;
  }
  .signout-link:hover { color: var(--rose); }

  .plant-wrap {
    position: relative;
    display:flex;
    justify-content:center;
    align-items: flex-end;
    height: 258px;
    margin-top: 6px;
    z-index: 1;
  }

  .streak-ring {
    position: absolute;
    top: 4px;
    right: 0;
    display:flex;
    flex-direction: column;
    align-items:center;
    font-family: var(--font-mono);
  }

  .streak-ring .num {
    font-size: 22px;
    font-weight: 500;
    color: var(--sage-bright);
    line-height:1;
  }
  .streak-ring .label {
    font-size: 9px;
    color: var(--lavender-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 3px;
  }

  #bloomSvg { overflow: visible; }

  .bloom-unit {
    opacity: 0;
    transform-origin: center;
    transform: scale(0.4);
    transition: opacity 0.7s ease, transform 0.7s cubic-bezier(.34,1.56,.64,1);
  }
  .bloom-unit.show { opacity: 1; transform: scale(1); }

  .view { display:none; flex-direction:column; flex:1; overflow:hidden; z-index:1; }
  .view.active { display:flex; }

  .prompt-card {
    background: var(--surface);
    border-radius: 20px;
    padding: 18px 20px;
    z-index: 1;
    margin-top: 4px;
  }

  .prompt-label {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--rose);
    margin-bottom: 8px;
    display:block;
  }

  .prompt-text {
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 400;
    line-height: 1.35;
    margin-bottom: 14px;
    color: var(--cream);
  }

  .moods {
    display:flex;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .mood {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--surface-hi);
    border: 2px solid transparent;
    cursor: pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: border-color 0.2s, transform 0.2s;
  }
  .mood:hover { transform: translateY(-2px); }
  .mood.selected { border-color: var(--sage-bright); background: #46405c; }

  textarea.entry {
    width: 100%;
    background: var(--surface-hi);
    border: none;
    border-radius: 14px;
    color: var(--cream);
    font-family: var(--font-body);
    font-size: 14px;
    padding: 12px 14px;
    resize: none;
    height: 64px;
    line-height: 1.4;
  }
  textarea.entry::placeholder { color: var(--lavender-dim); }
  textarea.entry:focus { outline: 2px solid var(--sage); outline-offset: 1px; }

  .log-btn {
    width: 100%;
    margin-top: 12px;
    background: var(--sage);
    color: #16261a;
    border: none;
    border-radius: 14px;
    padding: 13px;
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .log-btn:hover { background: var(--sage-bright); }
  .log-btn:active { transform: scale(0.98); }
  .log-btn:disabled { background: #4b4560; color: var(--lavender-dim); cursor: default; }

  .toast {
    position: absolute;
    left: 26px; right: 26px;
    bottom: 92px;
    background: var(--cream);
    color: var(--ink);
    font-family: var(--font-display);
    font-size: 13.5px;
    padding: 12px 16px;
    border-radius: 14px;
    text-align:center;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.35s ease, transform 0.35s ease;
    z-index: 5;
    pointer-events:none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  nav.tabbar {
    display:flex;
    justify-content: space-around;
    align-items:center;
    padding: 14px 0;
    margin-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.06);
    z-index: 1;
  }
  .tab {
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 4px;
    color: var(--lavender-dim);
    cursor: pointer;
  }
  .tab.active { color: var(--sage-bright); }
  .tab span {
    font-family: var(--font-mono);
    font-size: 9.5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .journal-list {
    overflow-y: auto;
    flex: 1;
    display:flex;
    flex-direction:column;
    gap: 10px;
    margin-top: 10px;
    padding-bottom: 20px;
  }
  .journal-item {
    background: var(--surface);
    border-radius: 14px;
    padding: 12px 14px;
    flex-shrink: 0;
  }
  .journal-item .jhead {
    display:flex;
    justify-content: space-between;
    align-items:center;
    margin-bottom: 6px;
  }
  .journal-item .jdate {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--lavender-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .journal-item .jmood { font-size: 16px; }
  .journal-item .jtext {
    font-size: 13.5px;
    line-height: 1.4;
    color: var(--cream);
  }
  .journal-empty {
    color: var(--lavender-dim);
    font-size: 14px;
    text-align:center;
    margin-top: 80px;
    line-height: 1.5;
  }

  .you-stats {
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 14px;
  }
  .stat-card {
    background: var(--surface);
    border-radius: 16px;
    padding: 18px 14px;
    text-align:center;
  }
  .stat-num {
    font-family: var(--font-display);
    font-size: 28px;
    color: var(--sage-bright);
    line-height:1;
  }
  .stat-label {
    font-family: var(--font-mono);
    font-size: 9.5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--lavender-dim);
    margin-top: 6px;
  }

  .mood-breakdown {
    margin-top: 22px;
    overflow-y: auto;
  }
  .mood-breakdown-title {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--rose);
    margin-bottom: 12px;
    display:block;
  }
  .mood-bar-row {
    display:flex;
    align-items:center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .mood-bar-row .mface { font-size: 16px; width: 20px; }
  .mood-bar-track {
    flex:1;
    height: 8px;
    background: var(--surface-hi);
    border-radius: 4px;
    overflow:hidden;
  }
  .mood-bar-fill {
    height: 100%;
    background: var(--sage);
    border-radius: 4px;
    transition: width 0.5s ease;
  }
  .mood-bar-count {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--lavender-dim);
    width: 18px;
    text-align:right;
  }

  /* Auth screen */
  .auth-wrap {
    flex: 1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding: 30px;
    z-index: 1;
    position: relative;
  }
  .auth-brand {
    font-family: var(--font-display);
    font-size: 32px;
    text-align:center;
    margin-bottom: 6px;
  }
  .auth-sub {
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--lavender-dim);
    text-align:center;
    margin-bottom: 32px;
  }
  .auth-field {
    margin-bottom: 14px;
  }
  .auth-field label {
    display:block;
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--lavender-dim);
    margin-bottom: 6px;
  }
  .auth-field input {
    width: 100%;
    background: var(--surface-hi);
    border: none;
    border-radius: 12px;
    color: var(--cream);
    font-family: var(--font-body);
    font-size: 14px;
    padding: 12px 14px;
  }
  .auth-field input:focus { outline: 2px solid var(--sage); outline-offset: 1px; }
  .auth-error {
    font-size: 12.5px;
    color: var(--rose);
    margin-bottom: 10px;
    min-height: 16px;
    line-height:1.4;
  }
  .auth-btn {
    width: 100%;
    background: var(--sage);
    color: #16261a;
    border: none;
    border-radius: 14px;
    padding: 13px;
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    margin-top: 6px;
    transition: background 0.2s;
  }
  .auth-btn:hover { background: var(--sage-bright); }
  .auth-btn:disabled { background: #4b4560; color: var(--lavender-dim); cursor: default; }
  .auth-toggle {
    text-align:center;
    margin-top: 18px;
    font-size: 13px;
    color: var(--lavender-dim);
  }
  .auth-toggle button {
    background:none;
    border:none;
    color: var(--sage-bright);
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    padding: 0;
  }
</style>
</head>
<body>

<div class="app">

  <div class="auth-wrap" id="authWrap">
    <div class="auth-brand">Bloom</div>
    <div class="auth-sub" id="authSub">Sign in to continue</div>
    <div class="auth-error" id="authError"></div>
    <div class="auth-field">
      <label>Username</label>
      <input type="text" id="authUsername" autocomplete="username" placeholder="yourname">
    </div>
    <div class="auth-field">
      <label>Password</label>
      <input type="password" id="authPassword" autocomplete="current-password" placeholder="••••••••">
    </div>
    <button class="auth-btn" id="authSubmit">Sign In</button>
    <div class="auth-toggle" id="authToggleWrap">
      Don't have an account? <button id="authToggle">Sign up</button>
    </div>
  </div>

  <div class="screen" id="mainScreen" style="display:none">
    <header class="appbar">
      <div class="brand">Bloom</div>
      <div class="header-right">
        <div class="date" id="today"></div>
        <button class="signout-link" id="signOutBtn">Sign out</button>
      </div>
    </header>

    <div class="view active" id="viewToday">
      <div class="plant-wrap">
        <div class="streak-ring">
          <div class="num" id="streakNum">0</div>
          <div class="label">day streak</div>
        </div>

        <svg id="bloomSvg" width="220" height="240" viewBox="0 0 220 240" fill="none">
          <!-- pot -->
          <path d="M70 210 L150 210 L142 236 L78 236 Z" fill="#463A5C"/>
          <rect x="66" y="200" width="88" height="14" rx="6" fill="#544868"/>
          <!-- soil -->
          <ellipse cx="110" cy="203" rx="38" ry="6" fill="#2C2438"/>
          <!-- stem -->
          <path d="M110 203 C108 170 112 140 110 108" stroke="#7FA582" stroke-width="5" stroke-linecap="round" fill="none"/>

          <!-- leaves (base, always present) -->
          <g class="bloom-unit show" style="transition-delay:0s">
            <path d="M110 180 C90 176 78 160 82 144 C102 148 112 164 110 180 Z" fill="#7FA582"/>
          </g>
          <g class="bloom-unit show" style="transition-delay:0.1s">
            <path d="M110 180 C130 176 142 160 138 144 C118 148 108 164 110 180 Z" fill="#8FB996"/>
          </g>

          <!-- growth units unlocked by streak -->
          <g id="leaf3" class="bloom-unit">
            <path d="M110 150 C92 144 82 128 88 112 C106 118 114 134 110 150 Z" fill="#7FA582"/>
          </g>
          <g id="leaf4" class="bloom-unit">
            <path d="M110 150 C128 144 138 128 132 112 C114 118 106 134 110 150 Z" fill="#9CC49E"/>
          </g>
          <g id="bud1" class="bloom-unit">
            <circle cx="110" cy="104" r="10" fill="#E3A9A0"/>
          </g>
          <g id="flower1" class="bloom-unit">
            <g transform="translate(110,96)">
              <ellipse rx="9" ry="14" fill="#E3A9A0" transform="rotate(0)"/>
              <ellipse rx="9" ry="14" fill="#E3A9A0" transform="rotate(72)"/>
              <ellipse rx="9" ry="14" fill="#E3A9A0" transform="rotate(144)"/>
              <ellipse rx="9" ry="14" fill="#E3A9A0" transform="rotate(216)"/>
              <ellipse rx="9" ry="14" fill="#E3A9A0" transform="rotate(288)"/>
              <circle r="7" fill="#F2C879"/>
            </g>
          </g>
          <g id="flower2" class="bloom-unit">
            <g transform="translate(78,118)">
              <ellipse rx="6" ry="9" fill="#F2C879" transform="rotate(20)"/>
              <ellipse rx="6" ry="9" fill="#F2C879" transform="rotate(92)"/>
              <ellipse rx="6" ry="9" fill="#F2C879" transform="rotate(164)"/>
              <ellipse rx="6" ry="9" fill="#F2C879" transform="rotate(236)"/>
              <ellipse rx="6" ry="9" fill="#F2C879" transform="rotate(308)"/>
              <circle r="4.5" fill="#E3A9A0"/>
            </g>
          </g>
        </svg>
      </div>

      <div class="prompt-card">
        <span class="prompt-label" id="promptLabel">Today's check-in</span>
        <div class="prompt-text" id="promptText">How's your heart today, and what's one small thing you're grateful for?</div>
        <div class="moods" id="moods"></div>
        <textarea class="entry" id="entry" placeholder="Write a line or two..."></textarea>
        <button class="log-btn" id="logBtn">Log today</button>
      </div>
    </div>

    <div class="view" id="viewJournal">
      <div class="journal-list" id="journalList"></div>
    </div>

    <div class="view" id="viewYou">
      <div class="you-stats" id="youStats"></div>
      <div class="mood-breakdown" id="moodBreakdown">
        <span class="mood-breakdown-title">Mood breakdown</span>
        <div id="moodBars"></div>
      </div>
    </div>

    <div class="toast" id="toast"></div>
  </div>

  <nav class="tabbar" id="mainNav" style="display:none">
    <div class="tab active" id="tabToday" data-view="viewToday">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
      <span>Today</span>
    </div>
    <div class="tab" id="tabJournal" data-view="viewJournal">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19V5a2 2 0 012-2h12a2 2 0 012 2v14l-3-2-3 2-3-2-3 2-3-2z"/></svg>
      <span>Journal</span>
    </div>
    <div class="tab" id="tabYou" data-view="viewYou">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
      <span>You</span>
    </div>
  </nav>
</div>

<script>
  // ---------- Supabase setup ----------
  const SUPABASE_URL = 'https://nrsajzdjzdiaopmhvhpv.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5yc2FqemRqemRpYW9wbWh2aHB2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyMDQ2MDYsImV4cCI6MjA5ODc4MDYwNn0.NoJTlMFnR98ErhB-t9zGUnNBG2HGmGTqi_Wo0CC2K6E';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function usernameToEmail(username) {
    return username.trim().toLowerCase().replace(/\s+/g, '') + '@bloomapp.local';
  }

  // ---------- Mood + shared state ----------
  const moodDefs = [
    { face: '☹', color: '#B7AECD' },
    { face: '🙁', color: '#B7AECD' },
    { face: '😐', color: '#E3A9A0' },
    { face: '🙂', color: '#9CC49E' },
    { face: '😄', color: '#7FA582' },
  ];

  const growthStages = ['leaf3', 'leaf4', 'bud1', 'flower1', 'flower2'];
  const messages = [
    "Logged. A small root taking hold.",
    "Two days running — it's starting to show.",
    "Look closer — new growth today.",
    "That's a bud. Give it a few more days.",
    "First bloom. That took consistency.",
    "Full bloom. This is what showing up looks like."
  ];

  let selectedMood = null;
  let entries = []; // rows from supabase: {entry_date, mood, text}
  let currentUser = null;

  const moodsEl = document.getElementById('moods');
  const streakNum = document.getElementById('streakNum');
  const toast = document.getElementById('toast');
  const logBtn = document.getElementById('logBtn');
  const entry = document.getElementById('entry');

  moodDefs.forEach((m, i) => {
    const btn = document.createElement('div');
    btn.className = 'mood';
    btn.style.fontSize = '18px';
    btn.textContent = m.face;
    btn.addEventListener('click', () => {
      if (logBtn.disabled) return;
      document.querySelectorAll('.mood').forEach(el => el.classList.remove('selected'));
      btn.classList.add('selected');
      selectedMood = i;
    });
    moodsEl.appendChild(btn);
  });

  document.getElementById('today').textContent = new Date().toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase();

  function dateStr(offsetDays = 0) {
    const d = new Date();
    d.setDate(d.getDate() + offsetDays);
    return d.toISOString().slice(0, 10);
  }

  function showToast(text) {
    toast.textContent = text;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2600);
  }

  function formatEntryDate(ds) {
    const d = new Date(ds + 'T00:00:00');
    return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
  }

  function computeStreaks(rows) {
    const dateSet = new Set(rows.map(r => r.entry_date));
    let current = 0;
    let checkDate = new Date();
    const today = dateStr(0);
    if (!dateSet.has(today)) checkDate.setDate(checkDate.getDate() - 1);
    while (dateSet.has(checkDate.toISOString().slice(0, 10))) {
      current++;
      checkDate.setDate(checkDate.getDate() - 1);
    }
    const sorted = Array.from(dateSet).sort();
    let longest = 0, run = 0, prev = null;
    for (const d of sorted) {
      if (prev) {
        const diffDays = Math.round((new Date(d + 'T00:00:00') - new Date(prev + 'T00:00:00')) / 86400000);
        run = diffDays === 1 ? run + 1 : 1;
      } else {
        run = 1;
      }
      longest = Math.max(longest, run);
      prev = d;
    }
    return { current, longest };
  }

  function renderPlant(streak) {
    growthStages.forEach((id, i) => {
      const el = document.getElementById(id);
      if (i < streak) el.classList.add('show');
      else el.classList.remove('show');
    });
  }

  function renderJournal() {
    const list = document.getElementById('journalList');
    list.innerHTML = '';
    if (!entries.length) {
      list.innerHTML = '<div class="journal-empty">Nothing here yet.<br>Log a check-in on the Today tab to start your journal.</div>';
      return;
    }
    entries.slice().sort((a, b) => b.entry_date.localeCompare(a.entry_date)).forEach(item => {
      const face = moodDefs[item.mood] ? moodDefs[item.mood].face : '';
      const div = document.createElement('div');
      div.className = 'journal-item';
      const dateEl = document.createElement('div');
      dateEl.className = 'jhead';
      dateEl.innerHTML = `<span class="jdate">${formatEntryDate(item.entry_date)}</span><span class="jmood">${face}</span>`;
      const textEl = document.createElement('div');
      textEl.className = 'jtext';
      textEl.textContent = item.text && item.text.trim() ? item.text : 'No note added.';
      div.appendChild(dateEl);
      div.appendChild(textEl);
      list.appendChild(div);
    });
  }

  function renderYou() {
    const { current, longest } = computeStreaks(entries);
    const statsEl = document.getElementById('youStats');
    const grown = growthStages.filter(id => document.getElementById(id).classList.contains('show')).length;
    statsEl.innerHTML = `
      <div class="stat-card"><div class="stat-num">${current}</div><div class="stat-label">Current streak</div></div>
      <div class="stat-card"><div class="stat-num">${longest}</div><div class="stat-label">Longest streak</div></div>
      <div class="stat-card"><div class="stat-num">${entries.length}</div><div class="stat-label">Total check-ins</div></div>
      <div class="stat-card"><div class="stat-num">${grown}/${growthStages.length}</div><div class="stat-label">Plant growth</div></div>
    `;

    const barsEl = document.getElementById('moodBars');
    const counts = moodDefs.map(() => 0);
    entries.forEach(item => {
      if (typeof item.mood === 'number' && counts[item.mood] !== undefined) counts[item.mood]++;
    });
    const max = Math.max(1, ...counts);
    barsEl.innerHTML = moodDefs.map((m, i) => `
      <div class="mood-bar-row">
        <span class="mface">${m.face}</span>
        <div class="mood-bar-track"><div class="mood-bar-fill" style="width:${(counts[i] / max) * 100}%"></div></div>
        <span class="mood-bar-count">${counts[i]}</span>
      </div>
    `).join('');
  }

  function refreshTodayState() {
    const today = dateStr(0);
    const todaysEntry = entries.find(e => e.entry_date === today);
    const { current } = computeStreaks(entries);
    streakNum.textContent = current;
    renderPlant(current);

    if (todaysEntry) {
      selectedMood = todaysEntry.mood;
      document.querySelectorAll('.mood').forEach((el, i) => el.classList.toggle('selected', i === selectedMood));
      entry.value = todaysEntry.text || '';
      logBtn.disabled = true;
      logBtn.textContent = 'Logged for today';
      entry.disabled = true;
      document.querySelectorAll('.mood').forEach(el => el.style.pointerEvents = 'none');
    } else {
      selectedMood = null;
      document.querySelectorAll('.mood').forEach(el => {
        el.classList.remove('selected');
        el.style.pointerEvents = 'auto';
      });
      entry.value = '';
      entry.disabled = false;
      logBtn.disabled = false;
      logBtn.textContent = 'Log today';
    }
  }

  async function loadEntries() {
    const { data, error } = await sb
      .from('entries')
      .select('entry_date, mood, text')
      .eq('user_id', currentUser.id)
      .order('entry_date', { ascending: true });
    if (error) {
      showToast("Couldn't load your entries");
      console.error(error);
      return;
    }
    entries = data || [];
    refreshTodayState();
    renderJournal();
    renderYou();
  }

  logBtn.addEventListener('click', async () => {
    if (logBtn.disabled) return;
    if (selectedMood === null) {
      showToast('Pick how you\'re feeling first');
      return;
    }
    logBtn.disabled = true;
    logBtn.textContent = 'Saving...';

    const today = dateStr(0);
    const { error } = await sb.from('entries').upsert({
      user_id: currentUser.id,
      entry_date: today,
      mood: selectedMood,
      text: entry.value
    }, { onConflict: 'user_id,entry_date' });

    if (error) {
      showToast("Couldn't save — try again");
      console.error(error);
      logBtn.disabled = false;
      logBtn.textContent = 'Log today';
      return;
    }

    await loadEntries();
    const { current } = computeStreaks(entries);
    showToast(messages[Math.min(current, messages.length) - 1]);
  });

  // Tab switching
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(tab.dataset.view).classList.add('active');
      if (tab.dataset.view === 'viewJournal') renderJournal();
      if (tab.dataset.view === 'viewYou') renderYou();
    });
  });

  // ---------- Auth flow ----------
  let mode = 'signin'; // or 'signup'
  const authWrap = document.getElementById('authWrap');
  const mainScreen = document.getElementById('mainScreen');
  const mainNav = document.getElementById('mainNav');
  const authError = document.getElementById('authError');
  const authSub = document.getElementById('authSub');
  const authSubmit = document.getElementById('authSubmit');
  const authToggle = document.getElementById('authToggle');
  const authToggleWrap = document.getElementById('authToggleWrap');
  const authUsername = document.getElementById('authUsername');
  const authPassword = document.getElementById('authPassword');

  authToggle.addEventListener('click', () => {
    mode = mode === 'signin' ? 'signup' : 'signin';
    authError.textContent = '';
    if (mode === 'signup') {
      authSub.textContent = 'Create your account';
      authSubmit.textContent = 'Sign Up';
      authToggleWrap.innerHTML = 'Already have an account? <button id="authToggle2">Sign in</button>';
    } else {
      authSub.textContent = 'Sign in to continue';
      authSubmit.textContent = 'Sign In';
      authToggleWrap.innerHTML = 'Don\'t have an account? <button id="authToggle2">Sign up</button>';
    }
    document.getElementById('authToggle2').addEventListener('click', () => authToggle.click());
  });

  authSubmit.addEventListener('click', async () => {
    const username = authUsername.value.trim();
    const password = authPassword.value;
    authError.textContent = '';

    if (!username || !password) {
      authError.textContent = 'Enter a username and password.';
      return;
    }
    if (password.length < 6) {
      authError.textContent = 'Password must be at least 6 characters.';
      return;
    }

    authSubmit.disabled = true;
    authSubmit.textContent = 'Please wait...';
    const email = usernameToEmail(username);

    let result;
    if (mode === 'signup') {
      result = await sb.auth.signUp({ email, password, options: { data: { username } } });
    } else {
      result = await sb.auth.signInWithPassword({ email, password });
    }

    authSubmit.disabled = false;
    authSubmit.textContent = mode === 'signup' ? 'Sign Up' : 'Sign In';

    if (result.error) {
      authError.textContent = result.error.message.includes('already registered')
        ? 'That username is taken.'
        : result.error.message.includes('Invalid login')
        ? 'Incorrect username or password.'
        : result.error.message;
      return;
    }

    if (result.data.user) {
      enterApp(result.data.user);
    }
  });

  document.getElementById('signOutBtn').addEventListener('click', async () => {
    await sb.auth.signOut();
    currentUser = null;
    entries = [];
    authWrap.style.display = 'flex';
    mainScreen.style.display = 'none';
    mainNav.style.display = 'none';
    authUsername.value = '';
    authPassword.value = '';
  });

  function enterApp(user) {
    currentUser = user;
    authWrap.style.display = 'none';
    mainScreen.style.display = 'flex';
    mainNav.style.display = 'flex';
    loadEntries();
  }

  // Check for an existing session on load
  (async () => {
    const { data } = await sb.auth.getSession();
    if (data.session && data.session.user) {
      enterApp(data.session.user);
    }
  })();
</script>

</body>
</html>
